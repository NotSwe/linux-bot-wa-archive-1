name: RDP-BOT-WA-AUTO-LOOP

on:
  workflow_dispatch:

concurrency:
  group: rdp-wa-loop
  cancel-in-progress: true

jobs:
  run-bot:

    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write
      actions: write


    steps:

      - name: "1. Checkout Repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0


      - name: "2. Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "24"


      - name: "3. Cache NPM"
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-


      - name: "4. Setup VPN Cloudflare WARP"
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg

          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list

          sudo apt-get update -q
          sudo apt-get install -y cloudflare-warp

          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode warp
          warp-cli --accept-tos connect

          sleep 3

          echo "IP:"
          curl -4 ifconfig.me


      - name: "5. Install Dependencies"
        run: |
          npm install


      - name: "6. Telegram Monitor + Heartbeat"
        run: |

          (
          OFFSET=0

          while true
          do

            UPDATE=$(curl -s \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/getUpdates?offset=$OFFSET")


            if echo "$UPDATE" | grep -q '"/status"'; then

              MSG="🟢 BOT STATUS

Status: ONLINE
Workflow: ${{ github.workflow }}
Runner: Ubuntu
Watchdog: ACTIVE
Heartbeat: ACTIVE
Time: $(date)"


            elif echo "$UPDATE" | grep -q '"/health"'; then

              MSG="💚 HEALTH CHECK

System: HEALTHY
Bot Process: RUNNING
Backup: ENABLED
Auto Restart: ENABLED
Time: $(date)"


            else

              sleep 5
              continue

            fi


            curl -s \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$MSG"


            ID=$(echo "$UPDATE" | grep -o '"update_id":[0-9]*' | tail -1 | cut -d: -f2)

            if [ ! -z "$ID" ]; then
              OFFSET=$((ID+1))
            fi


            sleep 5

          done

          ) &



          (
          while true
          do

            sleep 1800

            curl -s \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="💓 HEARTBEAT

BOT masih aktif
Workflow: ${{ github.workflow }}
Time: $(date)"

          done

          ) &



      - name: "7. Run Bot (5 Jam + Watchdog)"
        run: |

          timeout 5h bash -c '

          while true
          do

            echo "Menjalankan Bot..."

            npm start


            curl -s \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="⚠️ BOT RESTART

Bot berhenti.
Watchdog aktif.
Restart otomatis."


            sleep 5

          done

          ' || true



      - name: "8. Cleanup Log"
        if: always()
        run: |

          find . -name "*.log" -type f -mtime +7 -delete || true



      - name: "9. Auto-Backup Session & File"
        if: always()
        run: |

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p storage/session

          git add -A

          git reset HEAD node_modules 2>/dev/null || true


          if git diff --cached --quiet; then

            echo "Tidak ada perubahan file."

          else

            git commit -m "Auto-backup data bot (5 jam) [skip ci]"

            git pull --rebase origin main || true

            git push origin HEAD:main

          fi



      - name: "10. Auto-Up Trigger Siklus Berikutnya"
        if: ${{ !cancelled() }}

        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

        run: |

          MAX_RETRY=20
          RETRY_DELAY=30


          for ((i=1;i<=MAX_RETRY;i++))
          do

            if gh workflow run "${{ github.workflow }}" --ref main
            then

              curl -s \
              "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d text="🔄 Workflow baru berhasil dijalankan"

              exit 0

            fi


            sleep $RETRY_DELAY

          done


          curl -s \
          "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="❌ Gagal menjalankan workflow berikutnya"


          exit 1
