name: RDP-BOT-WA-AUTO-LOOP

on:
  workflow_dispatch:
  # push:
  #   branches: [ main ]

concurrency:
  group: rdp-wa-loop
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write
      actions: write

    steps:
      - name: "1. Checkout Repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: "2. Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: "3. Cache NPM"
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-24
          restore-keys: |
            ${{ runner.os }}-node-

      - name: "4. Setup VPN Cloudflare WARP"
        run: |
          echo "Install WARP..."

          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg

          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list

          sudo apt-get update -q
          sudo apt-get install -y cloudflare-warp

          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode warp
          warp-cli --accept-tos connect

          sleep 3

          echo "VPN IP:"
          curl -4 ifconfig.me

      - name: "5. Install Dependencies + Retry"
        run: |
          MAX_RETRY=5

          for ((i=1;i<=MAX_RETRY;i++))
          do
            echo "Install npm percobaan $i/$MAX_RETRY"

            if npm install
            then
              echo "npm install berhasil"
              exit 0
            fi

            echo "npm install gagal"
            sleep 10
          done

          exit 1

      - name: "6. Run Bot (Auto Restart + Limit 5 Jam)"
        run: |
          timeout 5h bash -c '
          while true
          do
            echo "=============================="
            echo "BOT START"
            echo "$(date)"
            echo "=============================="

            npm start

            echo "BOT STOPPED"
            echo "Restart 5 detik..."

            sleep 5
          done
          ' || true

      - name: "7. Auto Backup"
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          echo "Add semua perubahan..."
          git add -A

          git reset HEAD node_modules 2>/dev/null || true

          echo "Commit..."
          git commit -m "Auto backup [skip ci]" || true

          echo "Sync repository..."
          git pull --rebase origin main || true

          for i in {1..5}
          do
            echo "Push percobaan $i/5"

            if git push origin HEAD:main
            then
              echo "Backup berhasil."
              exit 0
            fi

            echo "Pull ulang..."
            git pull --rebase origin main || true

            echo "Push gagal, retry 10 detik..."
            sleep 10
          done

          echo "Backup gagal."
          exit 1

      - name: "8. Auto-Up Trigger Workflow + Retry"
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          MAX_RETRY=10
          DELAY=30

          for ((i=1;i<=MAX_RETRY;i++))
          do
            echo "Trigger workflow percobaan $i/$MAX_RETRY"

            if gh workflow run "${{ github.workflow }}" --ref main
            then
              echo "Workflow berikutnya berhasil"
              exit 0
            fi

            echo "Gagal trigger"
            sleep $DELAY
          done

          echo "Tidak bisa menjalankan workflow baru"
          exit 1
