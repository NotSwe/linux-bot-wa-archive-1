name: RDP-BOT-WA-AUTO-LOOP

on:
  workflow_dispatch:

concurrency:
  group: rdp-wa-loop
  cancel-in-progress: true

jobs:
  run-bot:

    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write
      actions: write

    steps:

      - name: "1. Checkout Repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0


      - name: "2. Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "24"


      - name: "3. Cache NPM"
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}


      - name: "4. Setup Cloudflare WARP"
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare.list

          sudo apt update -q
          sudo apt install -y cloudflare-warp

          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode warp
          warp-cli --accept-tos connect


      - name: "5. Install Dependencies"
        run: |
          npm install


      - name: "6. Telegram Start"
        run: |
          curl -s \
          "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="🟢 BOT STARTED"


      - name: "7. Telegram Status Listener"
        run: |
          (
          OFFSET=0

          while true
          do

            UPDATE=$(curl -s \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/getUpdates?offset=$OFFSET")


            if echo "$UPDATE" | grep -q "/status"; then

              curl -s \
              "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d text="🟢 BOT STATUS

Status: ONLINE
Workflow: ${{ github.workflow }}
Runner: Ubuntu
Time: $(date)"

            fi


            ID=$(echo "$UPDATE" | grep -o '"update_id":[0-9]*' | tail -1 | cut -d: -f2)

            if [ -n "$ID" ]; then
              OFFSET=$((ID+1))
            fi


            sleep 5

          done
          ) &


      - name: "8. Run Bot"
        run: |
          timeout 5h bash -c '
          while true
          do
            echo "Starting Bot..."

            npm start

            curl -s \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="⚠️ BOT RESTART"

            sleep 5
          done
          ' || true


      - name: "9. Backup Session"
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git reset HEAD node_modules 2>/dev/null || true

          if git diff --cached --quiet
          then
            echo "No changes"
          else
            git commit -m "Auto backup bot [skip ci]"
            git pull --rebase origin main || true
            git push origin HEAD:main
          fi


      - name: "10. Trigger Next Cycle"
        if: ${{ !cancelled() }}

        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

        run: |
          gh workflow run "${{ github.workflow }}" --ref main || true
